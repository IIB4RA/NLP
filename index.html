<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الأكاديمي الذكي | RAG System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bot-bubble: #334155;
            --user-bubble: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chat-container {
            background-color: var(--chat-bg);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .chat-header {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-in;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background-color: var(--user-bubble);
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-bubble);
            color: var(--text-main);
            align-self: flex-end;
            border-bottom-left-radius: 2px;
            border: 1px solid #475569;
        }

        .intent-tag {
            font-size: 0.7rem;
            background-color: #0f172a;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: -10px;
            left: 10px;
            border: 1px solid var(--primary);
            font-family: monospace;
        }

        .input-area {
            padding: 20px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        button {
            padding: 0 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.95);
        }

        /* تنسيق النصوص اللي بتيجي من البوت (Bold) */
        .bot-message strong {
            color: #60a5fa;
        }

        .loading {
            align-self: flex-end;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h2><span class="status-dot"></span> المساعد الأكاديمي الذكي</h2>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Powered by FastAPI & Gemini</span>
            </div>
            <div>
                <button onclick="clearChat()" style="background-color: transparent; border: 1px solid #475569; padding: 5px 10px; font-size: 0.8rem;">مسح المحادثة</button>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                مرحباً بك! أنا مساعدك الأكاديمي. اسألني عن أنظمة الجامعة، الرسوم، التدريب الميداني، أو أي استفسار آخر!
            </div>
        </div>
        
        <div class="loading" id="loadingIndicator">جاري البحث في اللوائح والأنظمة...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        const API_URL = 'http://127.0.0.1:8000/api/chat';
        
        // 1. ADD THIS: A variable to store the conversation history
        let chatMemory = ""; 

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function formatBotResponse(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user-message');
            userInput.value = '';
            
            loadingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    // 2. CHANGE THIS: Send the chatMemory to the backend
                    body: JSON.stringify({ query: text, history: chatMemory })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                loadingIndicator.style.display = 'none';
                addBotMessage(data.response, data.intent);

                // 3. ADD THIS: Update the memory with the latest Q&A
                chatMemory += `Student: ${text}\nAssistant: ${data.response}\n`;

            } catch (error) {
                loadingIndicator.style.display = 'none';
                addMessage('عذراً، حدث خطأ في الاتصال بالسيرفر. تأكد أن السيرفر يعمل.', 'bot-message');
                console.error('Error:', error);
            }
        }

        function addMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addBotMessage(text, intent) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot-message';
            
            if(intent) {
                const intentTag = document.createElement('span');
                intentTag.className = 'intent-tag';
                intentTag.textContent = intent;
                messageDiv.appendChild(intentTag);
            }

            const textSpan = document.createElement('span');
            textSpan.innerHTML = formatBotResponse(text);
            messageDiv.appendChild(textSpan);

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChat() {
            chatBox.innerHTML = `
                <div class="message bot-message">
                    مرحباً بك! أنا مساعدك الأكاديمي. اسألني عن أنظمة الجامعة، الرسوم، التدريب الميداني، أو أي استفسار آخر!
                </div>
            `;
            // 4. ADD THIS: Wipe the memory when the user clears the chat
            chatMemory = "";
        }
    </script>
</body>
</html>
